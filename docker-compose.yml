services:
  api:
    build: .
    image: persona_content_generator:latest
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./db:/app/db
      - ./logging:/app/logging
      - ./artifact:/app/artifact
      - ./csv:/app/csv:ro

  ui:
    image: persona_content_generator:latest
    build: .
    depends_on:
      - api
    environment:
      - API_BASE_URL=http://api:8000
    # Streamlit reads from env_file too, but API_BASE_URL is set above for container networking.
    env_file:
      - .env
    command: streamlit run ui/chatbot.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "8501:8501"
    volumes:
      - ./db:/app/db
      - ./logging:/app/logging
      - ./artifact:/app/artifact
      - ./csv:/app/csv:ro
